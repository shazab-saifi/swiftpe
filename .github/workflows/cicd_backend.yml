name: Conitnous Deployment Backend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker image build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          file: ./docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.actor }}/backend:${{ github.sha }}
