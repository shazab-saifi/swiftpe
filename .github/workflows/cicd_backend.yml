name: Conitnous Deployment Backend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker image build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          file: ./docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.actor }}/backend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/swiftpe
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull
            docker compose up -d
            docker image prune -a -f
