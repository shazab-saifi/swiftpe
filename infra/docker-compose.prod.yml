services:
  nginx:
    image: nginx:alpine
    container_name: webserver

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - appnet

  backend:
    image: ghcr.io/shazab-saifi/backend:${IMAGE_TAG:-latest}
    container_name: swiftpe-be
    restart: unless-stopped

    networks:
      - appnet

    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

    expose:
      - 4000

  frontend:
    image: ghcr.io/shazab-saifi/frontend:${IMAGE_TAG:-latest}
    container_name: swiftpe-fe
    restart: unless-stopped

    networks:
      - appnet

    expose:
      - 3000

    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000

networks:
  appnet:
    driver: bridge
